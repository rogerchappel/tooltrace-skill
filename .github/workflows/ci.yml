name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check types
        run: npm run check
      - name: Run tests
        run: npm test
      - name: Run smoke
        run: npm run smoke
      - name: Check package contents
        run: npm run package:smoke
      - name: Validate release readiness
        run: npm run release:check
